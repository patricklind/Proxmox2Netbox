site_name: Proxmox2NetBox Docs
site_dir: ./site
site_url: https://proxmox2netbox.netbox.dev.br/
docs_dir: ./docs
repo_name: patricklind/Proxmox2NetBox
repo_url: https://github.com/patricklind/Proxmox2NetBox
theme:
  name: material
  custom_dir: docs/_theme/
  icon:
    repo: fontawesome/brands/github
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep-orange
      toggle:
        icon: material/lightbulb-outline
        name: Switch to Dark Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/lightbulb
        name: Switch to Light Mode
  features:
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - navigation.footer
    - navigation.path
    - navigation.top
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            extensions:
              - griffe_typingdoc
            show_bases: true
            #show_root_heading: true
            show_if_no_docstring: true
            inherited_members: true
            #members_order: source
            #separate_signature: true
            #unwrap_annotated: true
            #merge_init_into_class: true
            #docstring_section_style: spacy
            #signature_crossrefs: true

nav:
  - Proxmox2NetBox: index.md
  - Installation:
    - Pre-Installation: 'installation/pre-installation.md'
    - Installing the Plugin:
      - Using pip (recommended): 'installation/1-installing-plugin.md'
      - Using git: 'installation/2-installing-plugin-git.md'
      - Using Docker: 'installation/3-installing-plugin-docker.md'
extra:
  homepage: https://netboxlabs.com
extra_css:
  - https://cdn.materialdesignicons.com/5.4.55/css/materialdesignicons.min.css
  - extra.css
markdown_extensions:
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - abbr
  - toc:
      permalink: true
      toc_depth: 4
  - tables
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
extra_javascript:
  - 'https://cdn.jsdelivr.net/npm/@material-icons/iconfont/material-icons.min.js'
