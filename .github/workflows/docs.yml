name: docs
on:
  push:
    branches:
      - develop
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Markdown==3.3 mkdocs-material mkdocs-minify-plugin mkdocs-redirects pillow cairosvg
      - name: Deploy MkDocs site
        run: mkdocs gh-deploy --force
