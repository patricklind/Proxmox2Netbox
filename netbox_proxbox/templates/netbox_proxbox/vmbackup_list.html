{% extends 'generic/object_list.html' %}
{% load buttons %}
{% load helpers %}
{% load i18n %}

{% block bulk_buttons %}
  <div class="btn-group" role="group">
    {% if 'bulk_delete' in actions %}
      <button type="submit" name="_delete" {% formaction %}="{% url 'plugins:netbox_proxbox:vmbackup_bulk_delete' %}" class="btn btn-danger">
        <i class="mdi mdi-trash-can-outline" aria-hidden="true"></i> {% trans "Delete Selected" %}
      </button>
    {% endif %}
  </div>
{% endblock %}
